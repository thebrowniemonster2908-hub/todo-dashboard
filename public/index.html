<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1>📋 Todo Dashboard</h1>
        <div class="header-stats">
          <span class="stat">
            Total: <strong id="totalCount">0</strong>
          </span>
          <span class="stat">
            Completed: <strong id="completedCount">0</strong>
          </span>
          <span class="stat">
            Pending: <strong id="pendingCount">0</strong>
          </span>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Add Task Form -->
      <section class="add-task-section">
        <h2>Add New Task</h2>
        <form id="addTaskForm" class="task-form">
          <input
            type="text"
            id="taskTitle"
            placeholder="Task title..."
            required
            class="input-field"
          />
          <textarea
            id="taskDescription"
            placeholder="Task description (optional)..."
            class="input-field textarea-field"
            rows="3"
          ></textarea>
          <div class="form-row">
            <select id="taskPriority" class="input-field priority-select">
              <option value="low">🟢 Low Priority</option>
              <option value="medium" selected>🟡 Medium Priority</option>
              <option value="high">🔴 High Priority</option>
              <option value="critical">⚫ Critical Priority</option>
            </select>
            <button type="submit" class="btn btn-primary">Add Task</button>
          </div>
        </form>
      </section>

      <!-- Tasks Display -->
      <section class="tasks-section">
        <div class="section-header">
          <h2>Tasks</h2>
          <button id="runWorkerBtn" class="btn btn-secondary">▶️ Run Worker Now</button>
        </div>
        <div id="tasksList" class="tasks-list">
          <!-- Tasks will be rendered here -->
        </div>
        <div id="emptyState" class="empty-state">
          <p>No tasks yet. Add one to get started! 🚀</p>
        </div>
      </section>

      <!-- Logs Display -->
      <section class="logs-section">
        <div class="section-header">
          <h2>Activity Log</h2>
          <button id="clearLogsBtn" class="btn btn-secondary">Clear Logs</button>
        </div>
        <div id="logsList" class="logs-list">
          <!-- Logs will be rendered here -->
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
